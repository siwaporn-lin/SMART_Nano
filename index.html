<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SMART Nano Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=10">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<!-- ===== หน้าเข้าสู่ระบบ / ผูกบัญชี LINE ครั้งแรก ===== -->
<div id="loginView" style="display:none;">
  <div class="header"><h1>🎓 SMART Nano Learning</h1><p>วิชาการประกันภัย | วิทยาลัยอาชีวศึกษาสุรินทร์</p></div>
  <div class="container">
    <div class="card">
      <h2 id="loginTitle">เข้าสู่ระบบ</h2>
      <p class="muted" id="loginHint" style="margin-bottom:10px;">เลือกชื่อของคุณเพื่อเริ่มเรียนรู้</p>
      <select id="studentSelect"><option value="">-- กำลังโหลดรายชื่อ --</option></select>
      <button class="btn" id="loginBtn" onclick="login()">เข้าสู่ระบบ</button>
      <button class="btn green" id="lineLoginBtn" onclick="lineLogin()" style="display:none;">🟢 เข้าสู่ระบบด้วย LINE</button>
      <div id="loadMsg" class="muted" style="text-align:center;margin-top:8px;"></div>
    </div>
  </div>
</div>

<!-- ===== แดชบอร์ดโปรไฟล์ ===== -->
<div id="profileView" style="display:none;">
  <div class="profile-top">
    <div class="profile-row">
      <div class="avatar" id="avatar">🙂</div>
      <div class="profile-info">
        <div class="pname" id="pName">-</div>
        <div class="plevel" id="pLevel">ระดับ: -</div>
      </div>
      <div class="ppoints"><div class="num" id="pPoints">0</div><div class="unit">คะแนน</div></div>
    </div>
    <div class="level-wrap">
      <div class="level-label"><span id="pLevelName">-</span><span id="pLevelProgress">0/0</span></div>
      <div class="level-bar"><div class="level-fill" id="pLevelFill" style="width:0%;"></div></div>
    </div>
    <div class="mini-stats">
      <div class="mini"><div class="mini-num" id="mCheckin">–</div><div class="mini-label">เช็คอิน</div></div>
      <div class="mini"><div class="mini-num" id="mBadge">–</div><div class="mini-label">Badge</div></div>
      <div class="mini"><div class="mini-num" id="mRank">–</div><div class="mini-label">อันดับ</div></div>
    </div>
  </div>
  <div class="container" style="padding-top:12px;">
    <a class="btn" id="btnLessons">📚 เข้าสู่บทเรียน</a>
    <a class="btn orange" id="btnCheckin">📍 เช็คอินภารกิจ</a>
    <a class="btn gray" id="btnBadges">🎖️ Badge ของฉัน</a>
    <a class="btn gray" id="btnLeaderboard">🏆 ดูอันดับ</a>
    <button class="btn red" onclick="logout()">ออกจากระบบ</button>
  </div>
</div>

<script src="config.js?v=10"></script>
<script src="app.js?v=10"></script>
<script>
var lineProfile = null;   // เก็บโปรไฟล์ LINE (userId, displayName, pictureUrl)

window.addEventListener('DOMContentLoaded', initAuth);

// ===== ระบบยืนยันตัวตน: ใช้ LINE ก่อน ถ้าไม่มีค่อยใช้แบบเลือกชื่อ (ทดสอบ) =====
function initAuth() {
  var hasLiff = (typeof liff !== 'undefined') && (typeof LIFF_ID !== 'undefined') && LIFF_ID;
  if (!hasLiff) { fallbackNoLine(); return; }
  liff.init({ liffId: LIFF_ID }).then(function() {
    if (liff.isLoggedIn()) {
      liff.getProfile().then(function(p) {
        lineProfile = p;
        resolveLineUser(p);
      }).catch(fallbackNoLine);
    } else {
      // ยังไม่ล็อกอิน LINE -> พาไปล็อกอินทันที (ได้ทั้งในแอป LINE และเบราว์เซอร์)
      liff.login();
    }
  }).catch(function() { fallbackNoLine(); });
}

// เปิดนอก LINE หรือ LIFF ใช้ไม่ได้ -> ใช้ระบบเลือกชื่อเดิม (สำหรับทดสอบ)
function fallbackNoLine() {
  var sid = getSid();
  if (sid) { showProfile(sid); } else { showLogin(); }
}

// รู้จัก LINE userId แล้ว -> สมัคร/เข้าระบบอัตโนมัติด้วยชื่อ LINE
function resolveLineUser(p) {
  var nameB64 = '';
  try { nameB64 = btoa(unescape(encodeURIComponent(p.displayName || ''))); } catch(e) { nameB64 = ''; }
  callAPI('lineLogin', { line: p.userId, name: nameB64 }, function(r) {
    if (r && r.student_id) {
      try { localStorage.setItem('smart_sid', r.student_id); } catch(e) {}
      showProfile(r.student_id, p);
    } else {
      showLinking(p);
    }
  });
}

// --- หน้าจอต่าง ๆ ---
function showLogin() {           // โหมดทดสอบ (ไม่มี LINE)
  showLoginCard('เข้าสู่ระบบ', 'เลือกชื่อของคุณเพื่อเริ่มเรียนรู้', 'เข้าสู่ระบบ', false);
}
function showLineLogin() {       // อยู่นอก LINE -> เชิญให้ล็อกอิน LINE (+ ทางเลือกทดสอบ)
  showLoginCard('เข้าสู่ระบบ', 'เข้าสู่ระบบด้วย LINE เพื่อใช้งาน (หรือเลือกชื่อเพื่อทดสอบ)', 'เข้าสู่ระบบ (ทดสอบ)', true);
}
function showLinking(p) {        // ครั้งแรกใน LINE -> ผูกบัญชี
  var hi = p && p.displayName ? ('สวัสดี ' + p.displayName + ' 👋 ') : '';
  showLoginCard('ยืนยันตัวตนครั้งแรก', hi + 'เลือกชื่อของคุณในระบบ 1 ครั้ง แล้วครั้งต่อไปเข้าได้เลย', 'ยืนยันและเข้าใช้งาน', false);
}
function showLoginCard(title, hint, btnText, showLineBtn) {
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('profileView').style.display = 'none';
  document.getElementById('loginTitle').textContent = title;
  document.getElementById('loginHint').textContent = hint;
  document.getElementById('loginBtn').textContent = btnText;
  document.getElementById('lineLoginBtn').style.display = showLineBtn ? 'block' : 'none';
  loadStudents();
}

function loadStudents() {
  document.getElementById('loadMsg').textContent = 'กำลังเชื่อมต่อระบบ...';
  callAPI('getStudents', null, function(students) {
    var sel = document.getElementById('studentSelect');
    var msg = document.getElementById('loadMsg');
    if (students.error) { sel.innerHTML='<option value="">โหลดไม่สำเร็จ</option>'; msg.textContent='❌ '+students.error; return; }
    sel.innerHTML = '<option value="">-- เลือกชื่อของคุณ --</option>';
    for (var i=0;i<students.length;i++) { var s=students[i]; sel.innerHTML+='<option value="'+s.student_id+'">'+s.full_name+' ('+s.student_id+')</option>'; }
    msg.textContent = '✅ พร้อมใช้งาน (' + students.length + ' คน)';
  });
}

function lineLogin() {
  if (typeof liff !== 'undefined' && liff.login) { liff.login(); }
}

// กดปุ่มเข้าสู่ระบบ / ยืนยันตัวตน
function login() {
  var sid = document.getElementById('studentSelect').value;
  if (!sid) { alert('กรุณาเลือกชื่อของคุณ'); return; }
  if (lineProfile) {
    // ผูก LINE เข้ากับนักเรียน
    callAPI('linkLine', { line: lineProfile.userId, student: sid, name: lineProfile.displayName || '' }, function(r) {
      if (r.error) { alert('❌ ' + r.error); return; }
      var id = r.student_id || sid;
      try { localStorage.setItem('smart_sid', id); } catch(e) {}
      showProfile(id, lineProfile);
    });
  } else {
    try { localStorage.setItem('smart_sid', sid); } catch(e) {}
    showProfile(sid);
  }
}

// ===== ระดับตามคะแนนสะสม =====
function levelInfo(points) {
  var tiers = [
    { min: 0,    name: 'มือใหม่' },
    { min: 100,  name: 'ผู้เรียนรู้' },
    { min: 300,  name: 'นักผจญภัย' },
    { min: 600,  name: 'ผู้เชี่ยวชาญ' },
    { min: 1000, name: 'ปรมาจารย์' }
  ];
  var i = 0;
  for (var k = 0; k < tiers.length; k++) { if (points >= tiers[k].min) i = k; }
  var cur = tiers[i], next = tiers[i + 1];
  if (!next) return { name: cur.name, text: points + ' คะแนน', pct: 100 };
  return { name: cur.name, text: points + '/' + next.min, pct: Math.round(points / next.min * 100) };
}

function showProfile(sid, profile) {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('profileView').style.display = 'block';
  buildNav('home', sid);

  document.getElementById('btnLessons').href     = 'lessons.html?sid=' + sid;
  document.getElementById('btnCheckin').href     = 'checkin.html?sid=' + sid;
  document.getElementById('btnBadges').href      = 'badges.html?sid=' + sid;
  document.getElementById('btnLeaderboard').href = 'leaderboard.html?sid=' + sid;

  // โชว์ชื่อ + รูปจาก LINE ทันที (ถ้ามี)
  if (profile && profile.pictureUrl) document.getElementById('avatar').innerHTML = '<img src="' + profile.pictureUrl + '" alt="">';
  if (profile && profile.displayName) document.getElementById('pName').textContent = profile.displayName;

  callAPI('getStudent', { student: sid }, function(s) {
    if (s.error) { logout(); return; }
    var name = (profile && profile.displayName) ? profile.displayName : (s.full_name || 'นักเรียน');
    document.getElementById('pName').textContent = name;
    if (!(profile && profile.pictureUrl)) document.getElementById('avatar').textContent = (name.trim().charAt(0) || '🙂');
    document.getElementById('pPoints').textContent = s.total_points;
    var lv = levelInfo(Number(s.total_points) || 0);
    document.getElementById('pLevel').textContent = 'ระดับ: ' + lv.name;
    document.getElementById('pLevelName').textContent = lv.name;
    document.getElementById('pLevelProgress').textContent = lv.text;
    document.getElementById('pLevelFill').style.width = lv.pct + '%';
  });

  callAPI('getBadges', { student: sid }, function(b) {
    if (b.error || !b.length) return;
    var earned = 0;
    for (var i=0;i<b.length;i++) if (b[i].earned) earned++;
    document.getElementById('mBadge').textContent = earned + '/' + b.length;
  });

  callAPI('getCheckins', { student: sid }, function(c) {
    if (c.error || !c.length) return;
    var done = 0;
    for (var i=0;i<c.length;i++) if (c[i].checked) done++;
    document.getElementById('mCheckin').textContent = done + '/' + c.length;
  });

  callAPI('getLeaderboard', null, function(lb) {
    if (lb.error || !lb.length) return;
    for (var i=0;i<lb.length;i++) { if (lb[i].student_id === sid) { document.getElementById('mRank').textContent = '#' + lb[i].rank; return; } }
  });
}
</script>
</body>
</html>
