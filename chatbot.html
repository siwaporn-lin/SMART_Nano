<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ครูประกันภัย</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=10">
</head>
<body>
<div class="header"><h1>🤖 ครูประกันภัย AI</h1><p>ถามอะไรเกี่ยวกับประกันภัยได้เลย</p></div>
<div class="container">
  <div class="chat-area" id="chatArea"><div class="chat-msg bot"><div class="chat-bubble">สวัสดีค่ะ ครูประกันภัยยินดีช่วยตอบคำถามเรื่องประกันภัยนะคะ 😊 มีอะไรอยากถามได้เลยค่ะ</div></div></div>
  <div class="chat-input-row"><input id="chatInput" placeholder="พิมพ์คำถาม..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="btn green" onclick="sendMsg()">ส่ง</button></div>
</div>
<script src="config.js?v=10"></script>
<script src="app.js?v=10"></script>
<script>
var SID = '';
var chatArea;
window.addEventListener('DOMContentLoaded', function() {
  SID = getSid();
  if (!SID) { document.querySelector('.container').innerHTML='<div class="card" style="text-align:center;"><p>กรุณาเข้าสู่ระบบก่อน</p><a class="btn" href="index.html">กลับหน้าแรก</a></div>'; return; }
  buildNav('chatbot', SID);
  chatArea = document.getElementById('chatArea');
});
function addMsg(text, who) {
  var div = document.createElement('div');
  div.className = 'chat-msg ' + who;
  div.innerHTML = '<div class="chat-bubble">'+text+'</div>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}
function sendMsg() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  addMsg(msg, 'user');
  input.value = '';
  var loading = addMsg('⏳ กำลังคิด...', 'bot');
  callAPI('chatbot', { student: SID, message: msg }, function(r) {
    loading.querySelector('.chat-bubble').textContent = r.error ? ('❌ ' + r.error) : r.reply;
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}
</script>
</body>
</html>
